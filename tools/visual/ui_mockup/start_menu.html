<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WORLDFORK</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)),
    url('../../../../ComfyUI/output/worldfork/ui_start_menu_bg.png');
  background-size: cover;
  background-position: center;
  font-family: 'Noto Serif KR', serif;
  color: #d4af37;
  overflow: hidden;
  position: relative;
}

.logo-area {
  position: absolute;
  top: 180px; left: 50%; transform: translateX(-50%);
  text-align: center;
}
.logo-main {
  font-size: 144px;
  font-weight: 900;
  color: #d4af37;
  letter-spacing: 24px;
  text-shadow:
    0 0 40px #8b0000,
    0 0 80px rgba(139,0,0,0.6),
    0 8px 0 #1a0808;
  margin-bottom: 12px;
  line-height: 1;
}
.logo-sub {
  font-size: 28px;
  color: #8b7355;
  letter-spacing: 12px;
  font-weight: 700;
}
.logo-tagline {
  font-size: 16px;
  color: #5a4a3a;
  letter-spacing: 6px;
  margin-top: 32px;
  font-style: italic;
}

.menu {
  position: absolute;
  top: 580px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column;
  gap: 14px;
  text-align: center;
  width: 360px;
}
.menu-item {
  padding: 18px 32px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(212,175,55,0.25);
  color: #c4a437;
  font-size: 24px;
  letter-spacing: 8px;
  cursor: pointer;
  transition: all 0.25s;
}
.menu-item:hover {
  background: rgba(139,0,0,0.4);
  border-color: #d4af37;
  color: #fff;
  letter-spacing: 12px;
  text-shadow: 0 0 20px #d4af37;
}
.menu-item.primary {
  background: linear-gradient(135deg, rgba(139,0,0,0.5), rgba(0,0,0,0.7));
  border-color: #d4af37;
  color: #d4af37;
  font-weight: 700;
}
.menu-item.primary:hover {
  background: linear-gradient(135deg, rgba(139,0,0,0.8), rgba(0,0,0,0.6));
}
.menu-item.disabled {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}

.notification {
  position: absolute;
  top: 32px; left: 32px;
  padding: 12px 20px;
  background: rgba(0,0,0,0.7);
  border-left: 3px solid #88e0e0;
  font-size: 13px;
  color: #b0d4e0;
  letter-spacing: 2px;
}
.notification .new-tag {
  display: inline-block;
  background: #88e0e0;
  color: #000;
  padding: 2px 6px;
  font-size: 10px;
  font-weight: 700;
  margin-right: 8px;
  letter-spacing: 1px;
}

.top-actions {
  position: absolute;
  top: 32px; right: 32px;
  display: flex; gap: 12px;
}
.top-action {
  width: 44px; height: 44px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(212,175,55,0.3);
  display: flex; align-items: center; justify-content: center;
  color: #8b7355;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.top-action:hover {
  border-color: #d4af37;
  color: #d4af37;
}

.bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 18px 32px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  display: flex; justify-content: space-between;
  font-size: 12px;
  color: #5a4a3a;
  letter-spacing: 2px;
}

.atmosphere {
  position: absolute;
  bottom: 80px; right: 48px;
  text-align: right;
  font-size: 14px;
  color: #6b5d3f;
  letter-spacing: 3px;
  font-style: italic;
  line-height: 1.8;
  max-width: 400px;
}
.atmosphere .accent { color: #8b0000; font-weight: 700; }

.key-hints {
  position: absolute;
  bottom: 80px; left: 48px;
  font-size: 12px;
  color: #5a4a3a;
  letter-spacing: 2px;
  line-height: 2;
}
.key-hints .key {
  display: inline-block;
  background: rgba(40,30,20,0.8);
  border: 1px solid rgba(212,175,55,0.3);
  padding: 2px 8px;
  margin-right: 6px;
  color: #d4af37;
  font-weight: 700;
  font-size: 11px;
}
</style>
</head>
<body>

  <div class="notification">
    <span class="new-tag">NEW</span>
    버전 0.7.0 — 시각화 7 화면 통합
  </div>

  <div class="top-actions">
    <div class="top-action" title="언어">KO</div>
    <div class="top-action" title="도움말">?</div>
  </div>

  <div class="logo-area">
    <div class="logo-main">WORLDFORK</div>
    <div class="logo-sub">DUNGEON OF DARKNESS</div>
    <div class="logo-tagline">168 시간. 두 영혼. 하나의 미궁.</div>
  </div>

  <div class="menu">
    <div class="menu-item primary">▸ 신규 시작</div>
    <div class="menu-item">이어하기</div>
    <div class="menu-item">설정</div>
    <div class="menu-item disabled">갤러리 (잠김)</div>
    <div class="menu-item" style="margin-top: 16px; font-size: 18px; padding: 14px;">종료</div>
  </div>

  <div class="atmosphere">
    "어둠 속에서 정수가 흐르고,<br>
    비석은 침묵하며 응답을 기다린다.<br>
    <span class="accent">9등급</span>의 미궁이 그대의 선택을 부른다."
  </div>

  <div class="key-hints">
    <div><span class="key">↑↓</span>메뉴 선택</div>
    <div><span class="key">Enter</span>확인</div>
    <div><span class="key">Esc</span>종료</div>
  </div>

  <div class="bottom-bar">
    <div>v0.7.0 (Phase 6 — 7/7 화면)</div>
    <div>DGX Spark · LLM-CRPG</div>
    <div>© 2026 WorldFork</div>
  </div>

</body>
</html>
