---
job: extension
config:
  name: "worldfork_bjorn_v1"
  process:
    - type: "sd_trainer"
      training_folder: "/home/hyunlord/lora_output"
      device: cuda:0
      trigger_word: "bjorn_warrior"

      network:
        type: "lora"
        linear: 16
        linear_alpha: 16

      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4

      datasets:
        - folder_path: "/home/hyunlord/ComfyUI/output/worldfork/lora_dataset_bjorn"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [1024]

      train:
        batch_size: 1
        steps: 1000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 4e-4
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16

      model:
        # ★ HF repo ID (★ HF token 설정 본격, ai-toolkit diffusers 형식 본격)
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true

      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "bjorn_warrior, barbarian warrior, holding axe, front portrait"
          - "bjorn_warrior, side profile, fierce expression"
          - "bjorn_warrior, full body, walking forward"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 4
        sample_steps: 25

meta:
  name: "worldfork_bjorn_v1"
  version: "1.0"
