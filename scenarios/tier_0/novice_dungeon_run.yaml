# 신참 탐험가의 첫 미궁 (Day 1 시나리오)
#
# 작품 IP 처리: "게임 속 바바리안으로 살아남기" (정윤강) 영감
# - 직접 인용 X
# - 캐릭터 이름 / 고유 설정 모두 변경
# - 장르 / 분위기만 차용

id: novice_dungeon_run
title: "신참 탐험가의 첫 미궁"
estimated_minutes: 15-30
turns_max: 10

setting:
  world: "라스카니아 왕국 — 가상의 중세 판타지"

  premise: |
    당신은 게임 「Dungeon and Stone」(가상 게임)을 즐기던 평범한 한국인.
    어느 날 잠에서 깨어보니 그 게임 속 바바리안 종족 캐릭터로 빙의되어 있었다.
    오늘은 당신의 첫 미궁 진입일. 죽으면 끝이다.

  player_character:
    name: "투르윈"
    race: "바바리안"
    height: "3m"
    skin: "푸른"
    background: "고향 부족에서 첫 미궁 도전을 위해 탐험가 길드에 등록"

characters:
  - id: companion_mage
    name: "셰인"
    role: "동료"
    persona: |
      30대 중반 남성 마법사. 깍듯하면서 눈치 빠른 사교적 인물.
      신참 바바리안에게 친절하지만, 위험 시 냉정한 판단.
      말투: 격식체 ("...입니다", "...셨군요").

  - id: guildmaster
    name: "올드 리브 영감"
    role: "탐험가 길드 마스터"
    persona: |
      60대 남성. 산전수전 다 겪은 노련한 길드 마스터.
      신참에게 짧고 직설적으로 조언. "허튼 짓 말고 살아 돌아와."
      말투: 약간의 사투리 ("...구먼", "...그래").

opening_scene:
  location: "탐험가 길드 정문"
  description: |
    아침 햇살이 라스카니아 수도 거리를 비춘다.
    당신은 거대한 푸른 손에 익숙해지려 애쓰며 길드 정문으로 들어선다.
    오늘이 당신의 첫 미궁 진입일이다.

    안에서 셰인이 손을 흔든다.

  initial_options:
    - "셰인에게 다가가 인사"
    - "먼저 길드 마스터 사무실로"
    - "주변을 둘러본다"
    - "(자유 입력)"

# Day 3+에서 활성화될 룰 (지금은 metadata로만 보존)
mechanical_rules:
  - rule: korean_ratio
    threshold: 0.7
    description: "응답의 70% 이상이 한국어"

  - rule: ai_breakout
    forbidden_phrases:
      - "I'm an AI"
      - "ChatGPT"
      - "AI 언어 모델"
      - "AI 어시스턴트"
      - "저는 AI"
      - "Claude"
      - "GPT"

  - rule: ip_leakage
    forbidden_terms:
      - "비요른"
      - "한노아"
      - "이한수"
      - "라프도니아"
      - "정윤강"
      - "던전 앤 스톤"
      - "겜바바"
      - "게임 속 바바리안"

  - rule: world_consistency
    forbidden_elements:
      - "총"
      - "스마트폰"
      - "자동차"
      - "컴퓨터"
      - "인터넷"

  - rule: character_consistency
    description: "각 캐릭터의 persona 따름 (Day 4에 LLM Judge 활성)"

# Day 2: 분기 트리 (메타데이터만, 실제 분기 동작은 Tier 1+에서)
#
# 시나리오 흐름:
#   Phase 1 (1-3턴): 길드 진입 → 동료 만남 → 미궁 입구
#   Phase 2 (3-5턴): 첫 전투 (소형 마물)
#   Phase 3 (5-7턴): 첫 보상 / 후퇴 결정
#   Phase 4 (7-10턴): 결말

phases:
  - id: phase_1_entry
    name: "길드 진입 + 동료 만남"
    turn_range: [1, 3]
    description: "탐험가 길드에서 셰인을 만나고, 길드 마스터에게 신고."
    key_npcs:
      - companion_mage
      - guildmaster
    triggers:
      - id: meet_shane
        description: "셰인과 첫 인사 완료"
      - id: register_with_guildmaster
        description: "길드 마스터에게 등록 신고"

  - id: phase_2_combat
    name: "첫 전투"
    turn_range: [3, 5]
    description: "미궁 첫 층에서 소형 마물과 조우."
    key_events:
      - small_monster_encounter

  - id: phase_3_decision
    name: "후퇴 또는 진행 결정"
    turn_range: [5, 7]
    description: "전투 결과에 따라 진행 또는 후퇴 결정."

  - id: phase_4_ending
    name: "결말"
    turn_range: [7, 10]
    description: "선택된 결말 분기로 진행."

ending_branches:
  - id: first_combat_won
    name: "첫 전투 승리 + 첫 보상"
    type: best
    requirements:
      phase_2_outcome: combat_victory
      hp_threshold: 50
    description: "마물을 처치하고 보상을 획득. 무사 귀환."
    rewards:
      - "첫 미궁 보상 (드랍 아이템 1-2개)"
      - "탐험가 길드 평판 +5"

  - id: retreat
    name: "후퇴 (안전 ending)"
    type: safe
    requirements:
      decision: retreat
    description: "전투 회피, 안전 귀환. 보상은 X."

  - id: first_combat_lost
    name: "첫 전투 패배 (fail ending)"
    type: fail
    requirements:
      hp_threshold_below: 1
    description: "마물에게 패배. HP 0. 게임 종료."

  - id: ten_turns
    name: "10턴 자동 종료"
    type: default
    requirements:
      turn_threshold: 10
    description: "10턴 내에 결말 분기 도달 못함. 시간 초과."
